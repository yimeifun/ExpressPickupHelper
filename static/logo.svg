<?xml version="1.0" encoding="UTF-8"?>
<!--
  取件码助手 - 应用图标 SVG 源文件
  - viewBox: 1024x1024 (可无损缩放)
  - 主色: #1A2A4A (深蓝)
  - 强调色: #4CD964 (绿色)
  - 组成: 快递纸箱 + 条形码/数字 + 勾选标记
  可用作 logo.png 源，或直接作为网页/小程序 logo
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- 背景渐变：从深蓝到稍浅的蓝，形成具有层次感的圆角方形 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2A4A"/>
      <stop offset="100%" stop-color="#3A5A8A"/>
    </linearGradient>
    <!-- 纸箱高光 -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9E8"/>
      <stop offset="100%" stop-color="#F0D89A"/>
    </linearGradient>
    <!-- 纸张阴影 -->
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8ECF2"/>
    </linearGradient>
  </defs>

  <!-- 外层圆角背景 (adaptive-icon style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- 小点缀 - 环形 -->
  <circle cx="180" cy="200" r="14" fill="#4CD964" opacity="0.6"/>
  <circle cx="860" cy="260" r="10" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="820" cy="820" r="16" fill="#4CD964" opacity="0.5"/>

  <!-- 纸箱主体 -->
  <!-- 纸箱背面/底部 -->
  <path d="M220,560 L512,430 L804,560 L804,780 L512,910 L220,780 Z"
        fill="#E0BE6B"/>
  <!-- 纸箱正面 -->
  <path d="M220,560 L512,690 L804,560 L512,430 Z"
        fill="url(#boxGrad)"/>
  <!-- 正面右侧面板 (略微加深以体现立体) -->
  <path d="M512,690 L804,560 L804,780 L512,910 Z"
        fill="#C9A854" opacity="0.85"/>
  <!-- 正面左侧面板 -->
  <path d="M220,560 L512,690 L512,910 L220,780 Z"
        fill="#D4B878" opacity="0.9"/>
  <!-- 纸箱绑带 (十字交叉胶带) -->
  <path d="M492,430 L492,910" stroke="#C9A854" stroke-width="40" fill="none"/>
  <path d="M220,680 L804,680" stroke="#C9A854" stroke-width="40" fill="none"/>

  <!-- 顶部小纸标签 (带数字 6 位) -->
  <rect x="332" y="410" width="360" height="130" rx="18" ry="18" fill="url(#paperGrad)"
        transform="rotate(-8 512 475)"/>
  <!-- 标签上的条码 -->
  <g transform="rotate(-8 512 475)">
    <rect x="360" y="445" width="18" height="60" fill="#1A2A4A"/>
    <rect x="386" y="445" width="10" height="60" fill="#1A2A4A"/>
    <rect x="404" y="445" width="22" height="60" fill="#1A2A4A"/>
    <rect x="434" y="445" width="10" height="60" fill="#1A2A4A"/>
    <rect x="452" y="445" width="16" height="60" fill="#1A2A4A"/>
    <rect x="476" y="445" width="10" height="60" fill="#1A2A4A"/>
    <rect x="494" y="445" width="22" height="60" fill="#1A2A4A"/>
    <rect x="524" y="445" width="10" height="60" fill="#1A2A4A"/>
    <rect x="542" y="445" width="18" height="60" fill="#1A2A4A"/>
    <rect x="568" y="445" width="12" height="60" fill="#1A2A4A"/>
    <rect x="588" y="445" width="20" height="60" fill="#1A2A4A"/>
    <rect x="616" y="445" width="12" height="60" fill="#1A2A4A"/>
    <rect x="636" y="445" width="16" height="60" fill="#1A2A4A"/>
    <rect x="660" y="445" width="12" height="60" fill="#1A2A4A"/>
  </g>

  <!-- 6 位取件码数字 (居中展示) -->
  <g font-family="'SF Mono', 'Menlo', monospace" font-weight="700" fill="#1A2A4A">
    <text x="370" y="280" font-size="130">2</text>
    <text x="450" y="280" font-size="130">8</text>
    <text x="530" y="280" font-size="130">4</text>
    <text x="610" y="280" font-size="130">6</text>
    <text x="690" y="280" font-size="130">1</text>
    <text x="760" y="280" font-size="130">3</text>
  </g>

  <!-- 绿色对勾标记 (圆角徽章) -->
  <circle cx="820" cy="740" r="90" fill="#4CD964"/>
  <circle cx="820" cy="740" r="90" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.8"/>
  <path d="M770,745 L810,785 L870,710"
        stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 上方文字: 取件 -->
  <text x="220" y="200" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="90" font-weight="600" fill="#FFFFFF" letter-spacing="6">极速 · 取件码</text>
</svg>
