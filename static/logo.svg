<?xml version="1.0" encoding="UTF-8"?>
<!--
  取件码助手 - 应用图标 SVG 源文件
  - viewBox: 1024x1024 (可无损缩放)
  - 背景色: #4A8DCC → #6FA3DE (浅蓝渐变)
  - 组成: 浅蓝圆角背景 + 立体纸箱 + 条形码标签 + 白色对勾
  无任何数字，保持第一版构图，仅背景色替换为浅蓝
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变：浅蓝 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A8DCC"/>
      <stop offset="100%" stop-color="#6FA3DE"/>
    </linearGradient>
    <!-- 纸箱高光 -->
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9E8"/>
      <stop offset="100%" stop-color="#F0D89A"/>
    </linearGradient>
    <!-- 纸张渐变 -->
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8ECF2"/>
    </linearGradient>
  </defs>

  <!-- 外层圆角背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- 小点缀 -->
  <circle cx="180" cy="200" r="14" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="860" cy="260" r="10" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="820" cy="820" r="16" fill="#FFFFFF" opacity="0.28"/>

  <!-- 标题文字：取件码助手 -->
  <rect x="240" y="220" width="544" height="130" rx="24" ry="24" fill="#FFFFFF" opacity="0.97"/>
  <text x="512" y="314" font-family="'PingFang SC', 'Microsoft YaHei', 'Heiti SC', sans-serif"
        font-size="82" font-weight="800" fill="#4A8DCC" text-anchor="middle" letter-spacing="10">取件码助手</text>

  <!-- 纸箱主体 -->
  <path d="M220,560 L512,430 L804,560 L804,780 L512,910 L220,780 Z" fill="#D8B468"/>
  <path d="M220,560 L512,690 L804,560 L512,430 Z" fill="url(#boxGrad)"/>
  <path d="M512,690 L804,560 L804,780 L512,910 Z" fill="#B09248" opacity="0.85"/>
  <path d="M220,560 L512,690 L512,910 L220,780 Z" fill="#C9A858" opacity="0.9"/>

  <!-- 纸箱绑带 - 十字交叉胶带 -->
  <path d="M492,430 L492,910" stroke="#C9A854" stroke-width="40" fill="none"/>
  <path d="M220,680 L804,680" stroke="#C9A854" stroke-width="40" fill="none"/>

  <!-- 顶部条形码标签 (带轻微旋转) -->
  <rect x="332" y="410" width="360" height="130" rx="18" ry="18" fill="url(#paperGrad)"
        transform="rotate(-8 512 475)"/>
  <g transform="rotate(-8 512 475)">
    <rect x="360" y="445" width="18" height="60" fill="#4A8DCC"/>
    <rect x="386" y="445" width="10" height="60" fill="#4A8DCC"/>
    <rect x="404" y="445" width="22" height="60" fill="#4A8DCC"/>
    <rect x="434" y="445" width="10" height="60" fill="#4A8DCC"/>
    <rect x="452" y="445" width="16" height="60" fill="#4A8DCC"/>
    <rect x="476" y="445" width="10" height="60" fill="#4A8DCC"/>
    <rect x="494" y="445" width="22" height="60" fill="#4A8DCC"/>
    <rect x="524" y="445" width="10" height="60" fill="#4A8DCC"/>
    <rect x="542" y="445" width="18" height="60" fill="#4A8DCC"/>
    <rect x="568" y="445" width="12" height="60" fill="#4A8DCC"/>
    <rect x="588" y="445" width="20" height="60" fill="#4A8DCC"/>
    <rect x="616" y="445" width="12" height="60" fill="#4A8DCC"/>
    <rect x="636" y="445" width="16" height="60" fill="#4A8DCC"/>
    <rect x="660" y="445" width="12" height="60" fill="#4A8DCC"/>
  </g>

  <!-- 白色对勾徽章 -->
  <circle cx="820" cy="740" r="90" fill="#FFFFFF"/>
  <circle cx="820" cy="740" r="90" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.6"/>
  <path d="M770,745 L810,785 L870,710"
        stroke="#4A8DCC" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
